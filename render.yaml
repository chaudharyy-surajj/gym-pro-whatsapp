services:
  # Next.js Web Application
  - type: web
    name: gym-pro-web
    env: node
    region: singapore
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gym-pro-db
          property: connectionString
    autoDeploy: true

  # WhatsApp Bot Service
  - type: web
    name: gym-pro-bot
    env: node
    region: singapore
    plan: free
    buildCommand: npm ci && npx puppeteer browsers install chrome
    startCommand: npm run bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gym-pro-db
          property: connectionString
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
    autoDeploy: true

databases:
  - name: gym-pro-db
    databaseName: gym_pro
    user: gym_pro_user
    plan: free
