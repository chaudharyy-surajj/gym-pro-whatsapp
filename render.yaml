services:
  # Next.js Web Application
  - type: web
    name: gym-pro-web
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gym-pro-db
          property: connectionString
    autoDeploy: true

databases:
  - name: gym-pro-db
    databaseName: gym_pro
    user: gym_pro_user
    plan: free
