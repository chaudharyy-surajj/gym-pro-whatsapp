<svg width="150" height="50" viewBox="0 0 150 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="compactGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Compact Barbell Icon -->
  <!-- Left Weight -->
  <rect x="5" y="20" width="8" height="10" rx="1" fill="url(#compactGradient)"/>
  <rect x="6" y="21" width="6" height="8" rx="1" fill="currentColor" opacity="0.2"/>
  
  <!-- Left Bar End -->
  <rect x="13" y="22" width="4" height="6" rx="1" fill="currentColor" opacity="0.4"/>
  
  <!-- Main Bar -->
  <rect x="17" y="23.5" width="16" height="3" rx="1.5" fill="currentColor" opacity="0.6"/>
  
  <!-- Right Bar End -->
  <rect x="33" y="22" width="4" height="6" rx="1" fill="currentColor" opacity="0.4"/>
  
  <!-- Right Weight -->
  <rect x="37" y="20" width="8" height="10" rx="1" fill="url(#compactGradient)"/>
  <rect x="38" y="21" width="6" height="8" rx="1" fill="currentColor" opacity="0.2"/>
  
  <!-- Text: GRAVITY -->
  <text x="52" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#compactGradient)" letter-spacing="1">GRAVITY</text>
  
  <!-- Text: FITNESS -->
  <text x="52" y="40" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="currentColor" letter-spacing="2" opacity="0.8">FITNESS</text>
</svg>
