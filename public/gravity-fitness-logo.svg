<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" stroke="#FF6B35" stroke-width="3"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Barbell Design -->
  <!-- Left Weight Plate -->
  <rect x="20" y="85" width="25" height="30" rx="3" fill="url(#gradient2)"/>
  <rect x="22" y="87" width="21" height="26" rx="2" fill="#2d2d2d"/>
  <circle cx="32.5" cy="100" r="8" fill="url(#gradient2)"/>
  
  <!-- Left Bar End -->
  <rect x="45" y="92" width="15" height="16" rx="2" fill="#555"/>
  
  <!-- Main Bar -->
  <rect x="60" y="96" width="80" height="8" rx="4" fill="#888"/>
  <rect x="60" y="97" width="80" height="3" fill="#aaa"/>
  
  <!-- Right Bar End -->
  <rect x="140" y="92" width="15" height="16" rx="2" fill="#555"/>
  
  <!-- Right Weight Plate -->
  <rect x="155" y="85" width="25" height="30" rx="3" fill="url(#gradient2)"/>
  <rect x="157" y="87" width="21" height="26" rx="2" fill="#2d2d2d"/>
  <circle cx="167.5" cy="100" r="8" fill="url(#gradient2)"/>
  
  <!-- Center Grip Lines -->
  <line x1="95" y1="96" x2="95" y2="104" stroke="#666" stroke-width="1.5"/>
  <line x1="100" y1="96" x2="100" y2="104" stroke="#666" stroke-width="1.5"/>
  <line x1="105" y1="96" x2="105" y2="104" stroke="#666" stroke-width="1.5"/>
  
  <!-- Text: GRAVITY -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#gradient2)" text-anchor="middle" letter-spacing="2">GRAVITY</text>
  
  <!-- Text: FITNESS -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle" letter-spacing="3">FITNESS</text>
  
  <!-- Subtitle: UNISEX GYM -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="8" font-weight="400" fill="#FF6B35" text-anchor="middle" letter-spacing="1">UNISEX GYM</text>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="45" r="3" fill="#FF6B35" opacity="0.6"/>
  <circle cx="85" cy="50" r="2" fill="#FF6B35" opacity="0.4"/>
  <circle cx="115" cy="50" r="2" fill="#FF6B35" opacity="0.4"/>
  
  <!-- Power Lines (representing strength) -->
  <path d="M 70 60 L 75 70 L 70 70 L 77 82" stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 130 60 L 125 70 L 130 70 L 123 82" stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
