<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a1a"/>
  <circle cx="32" cy="32" r="30" fill="url(#iconGradient)" opacity="0.1"/>
  
  <!-- Stylized Barbell -->
  <!-- Left Weight -->
  <rect x="8" y="26" width="10" height="12" rx="2" fill="url(#iconGradient)"/>
  <rect x="9" y="27" width="8" height="10" rx="1" fill="#1a1a1a"/>
  <circle cx="13" cy="32" r="3" fill="url(#iconGradient)"/>
  
  <!-- Left Bar -->
  <rect x="18" y="29" width="6" height="6" rx="1" fill="#555"/>
  
  <!-- Main Bar -->
  <rect x="24" y="30" width="16" height="4" rx="2" fill="#888"/>
  
  <!-- Right Bar -->
  <rect x="40" y="29" width="6" height="6" rx="1" fill="#555"/>
  
  <!-- Right Weight -->
  <rect x="46" y="26" width="10" height="12" rx="2" fill="url(#iconGradient)"/>
  <rect x="47" y="27" width="8" height="10" rx="1" fill="#1a1a1a"/>
  <circle cx="51" cy="32" r="3" fill="url(#iconGradient)"/>
  
  <!-- Letter G -->
  <text x="32" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="url(#iconGradient)" text-anchor="middle">G</text>
</svg>
